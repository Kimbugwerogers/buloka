<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin Approval</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .modal{
      display: none; /*hidden by default*/
      position: fixed;
      z-index: 1000;
      left: 0; 
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.5);
    }

    .modal-content{
      background-color: white;
      margin: 10% auto;
      padding: 20px;
      width: 400px;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .modal-buttons{
      display: flex;
      gap: 10px;
    }

    .cancel-btn{
      background-color: #e74c3c;
      color: white;
      border: none;
      padding: 10px;
      cursor: pointer;
    }
  </style>
  
  <body id="index">
    <header>
      <h1>Admin</h1>
    </header>

    <main id="pending-container">
        Loading places

        <div id="editModal" class="modal">
      <div class="modal-content">
        <h3>Edit Place</h3>
        <input type="hidden" id="edit-id">
       <input type ="text" id="managerName" placeholder="Manager_Name" required>
      <input type ="number" id="managerContact" placeholder="Manger_Contact" required>
      <input type ="text" id="placeName" placeholder="Place_Name" required>
      <input type ="text" id="locationName" placeholder="Location_Name" required>
      <input type ="number" id="ratingNumber" placeholder="Rating_Number" required>

      <div class="modal-buttons">
        <button onclick="saveEdit()">Save Changes</button>
        <button onclick="closeModal()" class="cancel-btn">Cancel</button>
      </div>
      </div>
    </div>
    
    </main>

    

    <footer>
      <a href="index.html" class="link">Back Home</a>
    </footer>

    <script src="approval.js"></script>
  </body>
</head>
</html>
